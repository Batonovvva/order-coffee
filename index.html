<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Заказ кофе</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <form class="order-form">
      <fieldset class="beverage">
        <button type="button" class="remove-button" aria-label="Удалить напиток">
          ×
        </button>
        <h4 class="beverage-count">Напиток №1</h4>

        <label class="field">
          <span class="label-text">Я буду</span>
          <select name="drink">
            <option value="Эспрессо">Эспрессо</option>
            <option value="Капучино" selected>Капучино</option>
            <option value="Какао">Какао</option>
          </select>
        </label>

        <div class="field">
          <span class="checkbox-label">Сделайте напиток на</span>
          <label class="checkbox-field">
            <input type="radio" name="milk" value="обычном молоке" checked />
            <span>обычном молоке</span>
          </label>
          <label class="checkbox-field">
            <input type="radio" name="milk" value="обезжиренном молоке" />
            <span>обезжиренном молоке</span>
          </label>
          <label class="checkbox-field">
            <input type="radio" name="milk" value="соевом молоке" />
            <span>соевом молоке</span>
          </label>
          <label class="checkbox-field">
            <input type="radio" name="milk" value="кокосовом молоке" />
            <span>кокосовом молоке</span>
          </label>
        </div>

        <div class="field">
          <span class="checkbox-label">Добавьте к напитку:</span>
          <label class="checkbox-field">
            <input type="checkbox" name="options" value="взбитые сливки" />
            <span>взбитых сливок</span>
          </label>
          <label class="checkbox-field">
            <input type="checkbox" name="options" value="зефирки" />
            <span>зефирок</span>
          </label>
          <label class="checkbox-field">
            <input type="checkbox" name="options" value="шоколад" />
            <span>шоколад</span>
          </label>
          <label class="checkbox-field">
            <input type="checkbox" name="options" value="корица" />
            <span>корицу</span>
          </label>
        </div>

        <label class="field wishes-field">
          <span class="checkbox-label">И еще вот что</span>
          <textarea
            class="wishes-input"
            name="wishes"
            rows="4"
            placeholder="Напишите пожелания к заказу"
          ></textarea>
        </label>

        <p class="wishes-preview">
          Текст пользователя:
          <span class="wishes-preview-text"></span>
        </p>
      </fieldset>

      <div>
        <button type="button" class="add-button">+ Добавить напиток</button>
      </div>
      <div class="submit-row">
        <button type="button" class="submit-button">Готово</button>
      </div>
    </form>

    <div class="modal-overlay hidden">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button type="button" class="modal-close-button" aria-label="Закрыть окно">
          ×
        </button>
        <h2 id="modal-title" class="modal-title">Заказ принят!</h2>
        <p class="modal-order-count"></p>
        <table class="order-table">
          <thead>
            <tr>
              <th>Напиток</th>
              <th>Молоко</th>
              <th>Дополнительно</th>
            </tr>
          </thead>
          <tbody class="order-table-body"></tbody>
        </table>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
